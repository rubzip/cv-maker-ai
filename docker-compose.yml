services:
  cv-backend:
    build:
      context: ./backend
    container_name: cv-backend
    environment:
      - DEBUG=${DEBUG:-1}
      - DATA_DIR=/app/data
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - ./data:/app/data
    command: uvicorn app.app:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/" ]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - cv-network

  cv-frontend:
    build:
      context: ./frontend
      target: build
    container_name: cv-frontend
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 3000
    depends_on:
      cv-backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - cv-network

networks:
  cv-network:
    driver: bridge
